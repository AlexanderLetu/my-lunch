<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETU WORK SPACE</title>
  
  <!-- Подключаем стили из отдельного файла CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Защищенное подключение Supabase с принудительным HTTP/2 (обход ERR_QUIC_PROTOCOL_ERROR) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Кнопка переключения дневной/ночной темы -->
  <button class="theme-toggle" onclick="toggleTheme()">🌓 Сменить тему</button>

  <!-- Вкладки переключения проектов сверху справа -->
  <div class="project-tabs">
    <button class="tab-btn active" onclick="switchProject('breaks')">Перерывы</button>
    <button class="tab-btn" onclick="switchProject('id')">ИД</button>
  </div>

  <!-- Окно авторизации -->
  <div class="auth-container" id="authBox">
    <h2 class="auth-title">LETU WORK SPACE<br><span id="projectSubTitle" style="color:var(--accent-neon); font-size:16px;">Авторизация: Перерывы</span></h2>
    <div class="input-group">
      <label for="username">Login:</label>
      <input type="text" id="username" class="input-field" placeholder="Введите ваш ID" autocomplete="off">
    </div>
    <div class="input-group">
      <label for="password">Password:</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="handleLogin()">Войти Workspace</button>
    <div class="error-msg" id="errorBlock"></div>
  </div>

  <!-- Окно выбора канала связи (скрыто на старте) -->
  <div class="channel-container" id="channelBox" style="display: none;">
    <h2 class="channel-title">ВЫБЕРИТЕ КАНАЛ СВЯЗИ</h2>
    <button class="channel-btn btn-hl" onclick="selectChannel('HL')">ГОРЯЧАЯ ЛИНИЯ</button>
    <button class="channel-btn btn-live" onclick="selectChannel('LIVE')">ЧАТ LIVETEX</button>
    <button class="channel-btn btn-night" onclick="selectChannel('NIGHT')">ЧАТ LIVETEX НОЧЬ</button>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН АДМИНИСТРАТОРА (скрыт на старте) -->
  <div class="admin-wrapper" id="adminDashboard" style="display: none;">
    
    <!-- Шапка управления админа -->
    <div class="admin-card">
      <div class="admin-header-info">
        <div class="admin-user-badge">ID: <span id="admUserId">admin</span> | <span style="color:#ff007f;">ADMIN: ПАНЕЛЬ</span></div>
        <button class="admin-logout-btn" onclick="location.reload()">ВЫЙТИ</button>
      </div>
      <div class="monitor-tabs">
        <button class="mon-tab active" onclick="switchMonitorTab('HL', this)">МОНИТОР ЛИНИЯ</button>
        <button class="mon-tab" onclick="switchMonitorTab('LIVE', this)">МОНИТОР ЧАТ</button>
        <button class="mon-tab" onclick="switchMonitorTab('NIGHT', this)">МОНИТОР НОЧЬ</button>
      </div>
      <div class="admin-actions">
        <button class="action-btn" onclick="alert('Добавим логику новостей')">НОВОСТИ LETU</button>
        <button class="action-btn" onclick="alert('Добавим генерацию отчета')">ОТЧЕТ</button>
        <button class="action-btn" onclick="alert('Добавим просмотр инцидентов')">ИНЦИДЕНТЫ</button>
        <button class="action-btn" onclick="alert('Добавим массовый сброс')">СБРОС ВСЕХ</button>
      </div>
    </div>

    <!-- Форма массового добавления слотов (встроена в панель админа горизонтально) -->
    <div class="admin-card" style="margin-top: -5px;">
      <h4 style="font-size: 13px; color: var(--text-gray); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-align: left;">
        ⚙️ Массовое добавление временных интервалов
      </h4>
      <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
        
        <!-- Выбор канала -->
        <div style="display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; text-align: left;">
          <label style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px;">Канал связи:</label>
          <select id="importChannel" style="width: 100%; background: var(--input-bg); border: 1px solid var(--border-sea); padding: 10px; border-radius: 8px; color: var(--text-white); font-size: 14px; outline: none; cursor: pointer;">
            <option value="HL">ГОРЯЧАЯ ЛИНИЯ</option>
            <option value="LIVE">ЧАТ LIVETEX</option>
            <option value="NIGHT">ЧАТ LIVETEX НОЧЬ</option>
          </select>
        </div>

        <!-- Выбор типа -->
        <div style="display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; text-align: left;">
          <label style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px;">Тип перерыва:</label>
          <select id="importType" style="width: 100%; background: var(--input-bg); border: 1px solid var(--border-sea); padding: 10px; border-radius: 8px; color: var(--text-white); font-size: 14px; outline: none; cursor: pointer;">
            <option value="short">Короткий (10/15 мин)</option>
            <option value="mid">Средний (20 мин)</option>
            <option value="lunch">Обед (30/40 мин)</option>
          </select>
        </div>

        <!-- Поле ввода текста интервалов -->
        <div style="display: flex; flex-direction: column; gap: 6px; flex: 2; min-width: 250px; text-align: left;">
          <label style="font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px;">Интервалы (Каждый с новой строки):</label>
          <textarea id="importRawText" style="width: 100%; background: var(--input-bg); border: 1px solid var(--border-sea); height: 40px; padding: 10px; border-radius: 8px; color: var(--text-white); font-size: 14px; outline: none; resize: none; font-family: monospace;" placeholder="10:00-10:15&#10;12:20-12:35"></textarea>
        </div>

        <!-- Кнопка импорта пачки -->
        <button style="background: var(--accent-neon); color: #0a1128; border: none; padding: 0 24px; font-size: 13px; font-weight: 700; border-radius: 8px; cursor: pointer; height: 40px; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'" onclick="handleMassImportSlots()">
          ЗАГРУЗИТЬ ПАЧКУ
        </button>
      </div>
    </div>


  <script>
    if (!window.supabaseInstance) {
      const url = 'https://rveladeasrfruhclnfyo.supabase.co';
      const key = 'sb_publishable_0pgZg-M-tkZ_De75fQDnVQ__Ssf_Fke';
      window.supabaseInstance = supabase.createClient(url, key);
    }
    const db = window.supabaseInstance;

    let currentProject = 'breaks'; 
    
    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    function switchProject(projectType) {
      currentProject = projectType;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      if (event && event.target) event.target.classList.add('active');
      const subTitle = document.getElementById('projectSubTitle');
      if (projectType === 'breaks') { subTitle.innerText = 'Авторизация: Перерывы'; } 
      else { subTitle.innerText = 'Авторизация: Проект ИД'; }
      document.getElementById('errorBlock').style.display = 'none';
    }

    document.getElementById('username').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
    document.getElementById('password').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.style.display = 'none';
      const inputUser = document.getElementById('username').value.trim();
      const inputPass = document.getElementById('password').value.trim();

      if (!inputUser || !inputPass) {
        showError("Заполните все поля логина и пароля!");
        return;
      }
      try {
        // Вызываем созданную нами безопасную функцию RPC на сервере
        const { data: user, error } = await db
          .rpc('check_user_login', { input_user: inputUser, input_pass: inputPass })
          .maybeSingle();

        if (error) throw error;
        if (!user) {
          showError("Неверный логин или пароль!");
          return;
        }

        console.log(`Успешный вход! Роль: ${user.role}. Проект: ${currentProject}`);
        
        // Надежно прячем окно входа для всех типов пользователей
        document.getElementById('authBox').style.display = 'none';

        // Если вошел администратор — открываем админку
        if (user.role === 'admin') {
          document.getElementById('admUserId').innerText = user.username;
          document.getElementById('adminDashboard').style.display = 'flex';
          return;
        }

        // Если вошел обычный оператор — запускаем проект перерывов или ИД
        if (currentProject === 'breaks') { 
          startBreaksProject(user); 
        } else { 
          startIdProject(user); 
        }
      } catch (err) { 
        showError("Ошибка подключения: " + err.message); 
      }
    }

    function showError(text) {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.innerText = text;
      errorBlock.style.display = 'block';
    }

    function startBreaksProject(user) {
      window.currentUser = user; 
      
      // НАДЕЖНОСТЬ: Принудительно прячем форму авторизации, если она не скрылась
      document.getElementById('authBox').style.display = 'none';
      
      // Показываем блок выбора каналов связи
      document.getElementById('channelBox').style.display = 'block';
    }

    function selectChannel(channelType) {
      console.log(`Пользователь ${window.currentUser.username} выбрал канал: ${channelType}`);
      document.getElementById('channelBox').style.display = 'none';
      renderTimeGrid(channelType);
    }

    // Главная функция генерации сетки расписания для оператора
    async function renderTimeGrid(channel) {
      document.body.innerHTML = '';
      
      const wrapper = document.createElement('div');
      wrapper.className = 'grid-wrapper';
      
      let channelName = channel === 'HL' ? 'ГОРЯЧАЯ ЛИНИЯ' : (channel === 'LIVE' ? 'ЧАТ LIVETEX' : 'ЧАТ LIVETEX НОЧЬ');
      let lunchDuration = channel === 'HL' ? '30 МИН' : '40 МИН';
      
      wrapper.innerHTML = `
        <div class="grid-header-card">
          <div class="grid-user-info">
            Оператор: <span>${window.currentUser.username}</span> | Канал: <span style="color:var(--accent-neon);">${channelName}</span>
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button class="theme-toggle-inline" onclick="toggleTheme()">🌓 Тема</button>
            <button class="grid-logout-btn" onclick="location.reload()">ВЫЙТИ</button>
          </div>
        </div>
        
        <div class="grid-columns-container">
          <!-- Колонка 1: Короткие перерывы -->
          <div class="grid-column">
            <h4 class="col-title">ПЕРЕРЫВЫ ${channel === 'HL' ? '10 МИН' : '15 МИН'}</h4>
            <div class="slots-box" id="shortBreaksBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
          
          <!-- Колонка 2: Только для LIVE и NIGHT (20 минут) -->
          ${channel !== 'HL' ? `
          <div class="grid-column">
            <h4 class="col-title">ПЕРЕРЫВЫ 20 МИН</h4>
            <div class="slots-box" id="midBreaksBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
          ` : ''}
          
          <!-- Колонка 3: Обеды -->
          <div class="grid-column">
            <h4 class="col-title">ОБЕДЫ (${lunchDuration})</h4>
            <div class="slots-box" id="lunchesBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
        </div>
      `;
      
      document.body.appendChild(wrapper);

      try {
        // Запрашиваем из Supabase все интервалы, которые относятся к ВЫБРАННОМУ каналу
        const { data: slots, error } = await db
          .from('time_slots')
          .select('slot_time, type')
          .eq('channel', channel);

        if (error) throw error;

        // Находим контейнеры колонок на странице
        const shortBox = document.getElementById('shortBreaksBox');
        const midBox = document.getElementById('midBreaksBox');
        const lunchBox = document.getElementById('lunchesBox');

        // Очищаем надписи "Загрузка..." перед выводом кнопок
        if (shortBox) shortBox.innerHTML = '';
        if (midBox) midBox.innerHTML = '';
        if (lunchBox) lunchBox.innerHTML = '';

        if (!slots || slots.length === 0) {
          const emptyMsg = '<div style="color:var(--text-gray); text-align:center; padding:20px;">Нет доступных слотов</div>';
          if (shortBox) shortBox.innerHTML = emptyMsg;
          if (midBox) midBox.innerHTML = emptyMsg;
          if (lunchBox) lunchBox.innerHTML = emptyMsg;
          return;
        }

        // Бежим по массиву полученных из базы слотов и распределяем их по колонкам
        slots.forEach(slot => {
          // Создаем красивую кнопку для каждого интервала
          const btn = document.createElement('button');
          btn.className = 'slot-item-btn free'; // По умолчанию все свободные, брони прикрутим следующим шагом
          btn.innerText = slot.slot_time;
          btn.onclick = () => alert(`Вы кликнули на слот: ${slot.slot_time}`);

          // Раскидываем кнопки по ID контейнеров в зависимости от типа 'short', 'mid', 'lunch'
          if (slot.type === 'short' && shortBox) {
            shortBox.appendChild(btn);
          } else if (slot.type === 'mid' && midBox) {
            midBox.appendChild(btn);
          } else if (slot.type === 'lunch' && lunchBox) {
            lunchBox.appendChild(btn);
          }
        });

      } catch (err) {
        alert("Ошибка загрузки расписания из базы: " + err.message);
      }
    }

    function startIdProject(user) {
      document.body.innerHTML = `<div style="text-align:center;font-size:24px;margin-top:50px;width:100%;color:var(--accent-neon);">🔍 Проект [ИД] успешно запущен для ${user.username}</div>`;
    }

    function switchMonitorTab(tabType, element) {
      document.querySelectorAll('.mon-tab').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      const title = document.getElementById('currentMonitorTitle');
      if (tabType === 'HL') title.innerText = 'ГОРЯЧАЯ ЛИНИЯ';
      else if (tabType === 'LIVE') title.innerText = 'ЧАТ LIVETEX';
      else title.innerText = 'ЧАТ LIVETEX НОЧЬ';
      console.log(`Админ переключился на просмотр смены: ${tabType}`);
    }
        // Функция массового импорта слотов времени для админа
    async function handleMassImportSlots() {
      const channel = document.getElementById('importChannel').value;
      const type = document.getElementById('importType').value;
      const rawText = document.getElementById('importRawText').value.trim();

      if (!rawText) {
        alert("Вставьте хотя бы один временной интервал!");
        return;
      }

      // Разбиваем текст по строкам
      const lines = rawText.split('\n');
      const slotsToInsert = [];
      const regex = /^\d{2}:\d{2}-\d{2}:\d{2}$/; // Регулярка проверки формата времени

      for (let line of lines) {
        let slot = line.trim();
        if (!slot) continue; // Пропускаем пустые строки

        // Проверяем формат времени
        if (!regex.test(slot)) {
          alert(`Ошибка в строке "${line}": Неверный формат! Используйте ЧЧ:ММ-ЧЧ:ММ (например, 14:00-14:15)`);
          return;
        }

        // Собираем объект для отправки в базу
        slotsToInsert.push({
          slot_time: slot,
          type: type,
          channel: channel
        });
      }

      if (slotsToInsert.length === 0) return;

      try {
        // Отправляем всю пачку в Supabase одной командой upsert (игнорирует дубликаты)
        const { data, error } = await db
          .from('time_slots')
          .upsert(slotsToInsert, { onConflict: 'slot_time,type,channel' }); // Наш составной ключ защитит от дублей

        if (error) throw error;

        alert(`Успешно загружено слотов: ${slotsToInsert.length}!`);
        document.getElementById('importRawText').value = ''; // Очищаем поле ввода
        
      } catch (err) {
        alert("Ошибка при массовом импорте: " + err.message);
      }
    }
  </script>
</body>
</html>
