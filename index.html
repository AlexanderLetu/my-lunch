<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETU WORK SPACE</title>
  
  <!-- Подключаем Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Цветовая палитра: глубокий морской стиль */
    :root {
      --bg-sea: #0a1128;       /* Глубокий океанский фон */
      --card-sea: #1c2541;     /* Цвет волны для карточки */
      --accent-neon: #00b4d8;  /* Неоновый голубой для активных элементов */
      --text-white: #f8f9fa;   /* Белый текст */
      --text-gray: #9ca3af;    /* Серый текст */
      --input-bg: #0b0c10;     /* Темный фон инпутов */
      --border-sea: #1f4068;   /* Морской контур */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-sea);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Навигация по проектам в правом верхнем углу */
    .project-tabs {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      background: var(--card-sea);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border-sea);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-gray);
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      color: var(--text-white);
    }

    .tab-btn.active {
      background: var(--accent-neon);
      color: var(--bg-sea);
      box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
    }

    /* Контейнер формы авторизации */
    .auth-container {
      background: var(--card-sea);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-sea);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 30px;
      color: var(--text-white);
    }

    .auth-title span {
      color: var(--accent-neon);
    }

    /* Поля ввода */
    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: var(--text-gray);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-field {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-sea);
      padding: 12px 16px;
      border-radius: 8px;
      color: var(--text-white);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: var(--accent-neon);
      box-shadow: 0 0 8px rgba(0, 180, 216, 0.2);
    }

    /* Кнопка войти */
    .login-btn {
      width: 100%;
      background: var(--accent-neon);
      color: var(--bg-sea);
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s ease, background 0.3s ease;
    }

    .login-btn:hover {
      background: #0096c7;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Блок вывода ошибок */
    .error-msg {
      color: #ff4d4d;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Вкладки переключения проектов сверху справа -->
  <div class="project-tabs">
    <button class="tab-btn active" onclick="switchProject('breaks')">Перерывы</button>
    <button class="tab-btn" onclick="switchProject('id')">ИД</button>
  </div>

  <!-- Окно авторизации -->
  <div class="auth-container" id="authBox">
    <h2 class="auth-title">LETU WORK SPACE<br><span id="projectSubTitle">Авторизация: Перерывы</span></h2>
    
    <div class="input-group">
      <label for="username">Login:</label>
      <input type="text" id="username" class="input-field" placeholder="Введите ваш ID" autocomplete="off">
    </div>

    <div class="input-group">
      <label for="password">Password:</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>

    <button class="login-btn" onclick="handleLogin()">Войти Workspace</button>
    <div class="error-msg" id="errorBlock"></div>
  </div>

  <script>
    // 1. Инициализация базы данных (СТРОГО ОДИН РАЗ)
    const supabaseUrl = 'https://rveladeasrfruhclnfyo.supabase.co'; 
    const supabaseKey = 'sb_publishable_0pgZg-M-tkZ_De75fQDnVQ__Ssf_Fke';
    const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

    // 2. Глобальные переменные
    let currentProject = 'breaks'; 

    // 3. Функция переключения вкладок проектов
    function switchProject(projectType) {
      currentProject = projectType;
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      const subTitle = document.getElementById('projectSubTitle');
      if (projectType === 'breaks') {
        subTitle.innerText = 'Авторизация: Перерывы';
      } else {
        subTitle.innerText = 'Авторизация: Проект ИД';
      }
      
      document.getElementById('errorBlock').style.display = 'none';
    }

    // 4. Слушатели клавиатуры (Enter) для удобного ввода
    document.getElementById('username').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
    document.getElementById('password').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });

    // 5. Главная функция авторизации
    async function handleLogin() {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.style.display = 'none';

      const inputUser = document.getElementById('username').value.trim().toLowerCase();
      const inputPass = document.getElementById('password').value.trim();

      if (!inputUser || !inputPass) {
        showError("Заполните все поля логина и пароля!");
        return;
      }

      try {
        // Делаем реальный точечный запрос в созданную нами таблицу users
        const { data: user, error } = await supabase
          .from('users')
          .select('username, password, role')
          .eq('username', inputUser)
          .maybeSingle();

        if (error) throw error;

        if (!user || user.password !== inputPass) {
          showError("Неверный логин или пароль!");
          return;
        }

        console.log(`Успешный вход! Роль: ${user.role}. Проект: ${currentProject}`);
        
        // Прячем форму входа
        document.getElementById('authBox').style.display = 'none';

        // Запускаем нужный проект
        if (currentProject === 'breaks') {
          startBreaksProject(user);
        } else {
          startIdProject(user);
        }

      } catch (err) {
        showError("Ошибка подключения к базе: " + err.message);
      }
    }

    function showError(text) {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.innerText = text;
      errorBlock.style.display = 'block';
    }

    // Заглушка проекта Перерывов
    function startBreaksProject(user) {
      document.body.innerHTML += `<div style="text-align:center;font-size:24px;margin-top:50px;width:100%;">🚀 Проект [Перерывы] успешно запущен для ${user.username} (${user.role})</div>`;
    }

    // Заглушка проекта ИД
    function startIdProject(user) {
      document.body.innerHTML += `<div style="text-align:center;font-size:24px;margin-top:50px;width:100%;color:var(--accent-neon);">🔍 Проект [ИД] успешно запущен для ${user.username} (${user.role})</div>`;
    }
  </script>
</body>
</html>
