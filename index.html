<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETU WORK SPACE</title>
  
  <!-- Подключаем стили из отдельного файла CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Защищенное подключение Supabase с принудительным HTTP/2 (обход ERR_QUIC_PROTOCOL_ERROR) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Кнопка переключения дневной/ночной темы -->
  <button class="theme-toggle" onclick="toggleTheme()">🌓 Сменить тему</button>

  <!-- Вкладки переключения проектов сверху справа -->
  <div class="project-tabs">
    <button class="tab-btn active" onclick="switchProject('breaks')">Перерывы</button>
    <button class="tab-btn" onclick="switchProject('id')">ИД</button>
  </div>

  <!-- Окно авторизации -->
  <div class="auth-container" id="authBox">
    <h2 class="auth-title">LETU WORK SPACE<br><span id="projectSubTitle" style="color:var(--accent-neon); font-size:16px;">Авторизация: Перерывы</span></h2>
    <div class="input-group">
      <label for="username">Login:</label>
      <input type="text" id="username" class="input-field" placeholder="Введите ваш ID" autocomplete="off">
    </div>
    <div class="input-group">
      <label for="password">Password:</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="handleLogin()">Войти Workspace</button>
    <div class="error-msg" id="errorBlock"></div>
  </div>

  <!-- Окно выбора канала связи (скрыто на старте) -->
  <div class="channel-container" id="channelBox" style="display: none;">
    <h2 class="channel-title">ВЫБЕРИТЕ КАНАЛ СВЯЗИ</h2>
    <button class="channel-btn btn-hl" onclick="selectChannel('HL')">ГОРЯЧАЯ ЛИНИЯ</button>
    <button class="channel-btn btn-live" onclick="selectChannel('LIVE')">ЧАТ LIVETEX</button>
    <button class="channel-btn btn-night" onclick="selectChannel('NIGHT')">ЧАТ LIVETEX НОЧЬ</button>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН АДМИНИСТРАТОРА (скрыт на старте) -->
  <div class="admin-wrapper" id="adminDashboard" style="display: none;">
    
    <!-- Шапка управления админа -->
    <div class="admin-card">
      <div class="admin-header-info">
        <div class="admin-user-badge">ID: <span id="admUserId">admin</span> | <span style="color:#ff007f;">ADMIN: ПАНЕЛЬ</span></div>
        <!-- Вывод текущей даты -->
        <div style="font-weight: 700; letter-spacing: 1px;" id="adminCurrentDate">15.07.2026</div>
        <button class="admin-logout-btn" onclick="location.reload()">ВЫЙТИ</button>
      </div>

      <!-- Вкладки мониторинга смен с кнопками-карандашами для редактирования слотов -->
      <div class="monitor-tabs" style="align-items: center;">
        <div style="display: flex; align-items: center; gap: 5px;">
          <button class="mon-tab active" onclick="switchMonitorTab('HL', this)">МОНИТОР ЛИНИЯ</button>
          <button class="action-btn" style="padding: 10px; font-size: 14px; border-radius: 8px;" title="Редактировать перерывы Горячей Линии" onclick="openEditSlotsModal('HL')">✏️</button>
        </div>
        
        <div style="display: flex; align-items: center; gap: 5px;">
          <button class="mon-tab" onclick="switchMonitorTab('LIVE', this)">МОНИТОР ЧАТ</button>
          <button class="action-btn" style="padding: 10px; font-size: 14px; border-radius: 8px;" title="Редактировать перерывы Чата" onclick="openEditSlotsModal('LIVE')">✏️</button>
        </div>

        <div style="display: flex; align-items: center; gap: 5px;">
          <button class="mon-tab" onclick="switchMonitorTab('NIGHT', this)">МОНИТОР НОЧЬ</button>
          <button class="action-btn" style="padding: 10px; font-size: 14px; border-radius: 8px;" title="Редактировать перерывы Ночного Чата" onclick="openEditSlotsModal('NIGHT')">✏️</button>
        </div>
      </div>

      <!-- Кнопки доп. функционала -->
      <div class="admin-actions">
        <button class="action-btn" onclick="alert('Логика аккаунтов')">+ АККАУНТЫ</button>
        <button class="action-btn" onclick="alert('Добавим логику новостей')">НОВОСТИ LETU</button>
        <button class="action-btn" onclick="alert('Добавим генерацию отчета')">ОТЧЕТ</button>
        <button class="action-btn" onclick="alert('Добавим просмотр инцидентов')">ИНЦИДЕНТЫ</button>
        <button class="action-btn" onclick="alert('Добавим массовый сброс')">СБРОС ВСЕХ</button>
      </div>
    </div>

  <!-- УЛУЧШЕННОЕ МОДАЛЬНОЕ ОКНО УПРАВЛЕНИЯ СЛОТАМИ -->
  <div id="slotsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 8, 20, 0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
    <div class="admin-card" style="width: 100%; max-width: 550px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; max-height: 90vh;">
      
      <!-- Шапка модалки -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-sea); padding-bottom: 10px; flex-shrink: 0;">
        <h3 style="font-size: 15px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;">
          ИНТЕРВАЛЫ: <span id="modalChannelTitle" style="color: var(--accent-neon);">КАНАЛ</span>
        </h3>
        <button class="reset-row-btn" style="font-size: 20px;" onclick="closeEditSlotsModal()">✕</button>
      </div>

      <!-- Блок добавления нового интервала (как в старой версии) -->
      <div style="background: var(--input-bg); border: 1px solid var(--border-sea); padding: 15px; border-radius: 10px; margin-bottom: 15px; flex-shrink: 0;">
        <div style="font-size: 11px; font-weight: 700; color: var(--text-gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left;">➕ Добавить новые интервалы:</div>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <select id="importType" style="width: 100%; background: var(--card-sea); border: 1px solid var(--border-sea); padding: 10px; border-radius: 6px; color: var(--text-white); font-size: 13px; outline: none; cursor: pointer;">
            <option value="short">Перерыв короткий</option>
            <option value="mid" id="modalMidOption">Перерыв 20 мин</option>
            <option value="lunch" id="modalLunchOption">Обед</option>
          </select>

          <div style="display: flex; gap: 10px;">
            <textarea id="importRawText" style="flex: 1; background: var(--card-sea); border: 1px solid var(--border-sea); height: 38px; padding: 8px 12px; border-radius: 6px; color: var(--text-white); font-size: 14px; outline: none; resize: none; font-family: monospace;" placeholder="Например: 16:00-16:15 (можно пачкой с новой строки)"></textarea>
            <button style="background: var(--accent-neon); color: #0a1128; border: none; padding: 0 20px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; height: 38px;" onclick="handleMassImportSlots()">OK</button>
          </div>
        </div>
      </div>

      <!-- Живой список текущих тегов на листе с автосортировкой -->
      <div style="text-align: left; margin-bottom: 8px; font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; flex-shrink: 0;">
        📋 Текущий список на листе (с автосортировкой часов):
      </div>
      
      <!-- Контейнер со скроллом для вывода тегов -->
      <div style="flex-grow: 1; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border-sea); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px;" id="modalTagsContainer">
        <!-- Сюда JS будет рендерить группы тегов -->
      </div>

      <!-- Кнопка закрытия -->
      <button style="width: 100%; background: var(--border-sea); color: var(--text-white); border: 1px solid var(--border-sea); padding: 12px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; flex-shrink: 0;" onclick="closeEditSlotsModal()">ЗАКРЫТЬ</button>

    </div>
  </div>

  <script>
    if (!window.supabaseInstance) {
      const url = 'https://rveladeasrfruhclnfyo.supabase.co';
      const key = 'sb_publishable_0pgZg-M-tkZ_De75fQDnVQ__Ssf_Fke';
      window.supabaseInstance = supabase.createClient(url, key);
    }
    const db = window.supabaseInstance;

    let currentProject = 'breaks'; 
    
    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    function switchProject(projectType) {
      currentProject = projectType;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      if (event && event.target) event.target.classList.add('active');
      const subTitle = document.getElementById('projectSubTitle');
      if (projectType === 'breaks') { subTitle.innerText = 'Авторизация: Перерывы'; } 
      else { subTitle.innerText = 'Авторизация: Проект ИД'; }
      document.getElementById('errorBlock').style.display = 'none';
    }

    document.getElementById('username').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
    document.getElementById('password').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.style.display = 'none';
      const inputUser = document.getElementById('username').value.trim();
      const inputPass = document.getElementById('password').value.trim();

      if (!inputUser || !inputPass) {
        showError("Заполните все поля логина и пароля!");
        return;
      }
      try {
        // Вызываем созданную нами безопасную функцию RPC на сервере
        const { data: user, error } = await db
          .rpc('check_user_login', { input_user: inputUser, input_pass: inputPass })
          .maybeSingle();

        if (error) throw error;
        if (!user) {
          showError("Неверный логин или пароль!");
          return;
        }

        console.log(`Успешный вход! Роль: ${user.role}. Проект: ${currentProject}`);
        
        // Надежно прячем окно входа для всех типов пользователей
        document.getElementById('authBox').style.display = 'none';

        // Если вошел администратор — открываем админку
        if (user.role === 'admin') {
          document.getElementById('admUserId').innerText = user.username;
          document.getElementById('adminDashboard').style.display = 'flex';
          return;
        }

        // Если вошел обычный оператор — запускаем проект перерывов или ИД
        if (currentProject === 'breaks') { 
          startBreaksProject(user); 
        } else { 
          startIdProject(user); 
        }
      } catch (err) { 
        showError("Ошибка подключения: " + err.message); 
      }
    }

    function showError(text) {
      const errorBlock = document.getElementById('errorBlock');
      errorBlock.innerText = text;
      errorBlock.style.display = 'block';
    }

    function startBreaksProject(user) {
      window.currentUser = user; 
      
      // НАДЕЖНОСТЬ: Принудительно прячем форму авторизации, если она не скрылась
      document.getElementById('authBox').style.display = 'none';
      
      // Показываем блок выбора каналов связи
      document.getElementById('channelBox').style.display = 'block';
    }

    function selectChannel(channelType) {
      console.log(`Пользователь ${window.currentUser.username} выбрал канал: ${channelType}`);
      document.getElementById('channelBox').style.display = 'none';
      renderTimeGrid(channelType);
    }

    // Главная функция генерации сетки расписания для оператора
    async function renderTimeGrid(channel) {
      document.body.innerHTML = '';
      
      const wrapper = document.createElement('div');
      wrapper.className = 'grid-wrapper';
      
      let channelName = channel === 'HL' ? 'ГОРЯЧАЯ ЛИНИЯ' : (channel === 'LIVE' ? 'ЧАТ LIVETEX' : 'ЧАТ LIVETEX НОЧЬ');
      let lunchDuration = channel === 'HL' ? '30 МИН' : '40 МИН';
      
      wrapper.innerHTML = `
        <div class="grid-header-card">
          <div class="grid-user-info">
            Оператор: <span>${window.currentUser.username}</span> | Канал: <span style="color:var(--accent-neon);">${channelName}</span>
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button class="theme-toggle-inline" onclick="toggleTheme()">🌓 Тема</button>
            <button class="grid-logout-btn" onclick="location.reload()">ВЫЙТИ</button>
          </div>
        </div>
        
        <div class="grid-columns-container">
          <!-- Колонка 1: Короткие перерывы -->
          <div class="grid-column">
            <h4 class="col-title">ПЕРЕРЫВЫ ${channel === 'HL' ? '10 МИН' : '15 МИН'}</h4>
            <div class="slots-box" id="shortBreaksBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
          
          <!-- Колонка 2: Только для LIVE и NIGHT (20 минут) -->
          ${channel !== 'HL' ? `
          <div class="grid-column">
            <h4 class="col-title">ПЕРЕРЫВЫ 20 МИН</h4>
            <div class="slots-box" id="midBreaksBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
          ` : ''}
          
          <!-- Колонка 3: Обеды -->
          <div class="grid-column">
            <h4 class="col-title">ОБЕДЫ (${lunchDuration})</h4>
            <div class="slots-box" id="lunchesBox"><div style="color:var(--text-gray); text-align:center; padding:20px;">Загрузка...</div></div>
          </div>
        </div>
      `;
      
      document.body.appendChild(wrapper);

      try {
        // Запрашиваем из Supabase все интервалы, которые относятся к ВЫБРАННОМУ каналу
        const { data: slots, error } = await db
          .from('time_slots')
          .select('slot_time, type')
          .eq('channel', channel);

        if (error) throw error;

        // Находим контейнеры колонок на странице
        const shortBox = document.getElementById('shortBreaksBox');
        const midBox = document.getElementById('midBreaksBox');
        const lunchBox = document.getElementById('lunchesBox');

        // Очищаем надписи "Загрузка..." перед выводом кнопок
        if (shortBox) shortBox.innerHTML = '';
        if (midBox) midBox.innerHTML = '';
        if (lunchBox) lunchBox.innerHTML = '';

        if (!slots || slots.length === 0) {
          const emptyMsg = '<div style="color:var(--text-gray); text-align:center; padding:20px;">Нет доступных слотов</div>';
          if (shortBox) shortBox.innerHTML = emptyMsg;
          if (midBox) midBox.innerHTML = emptyMsg;
          if (lunchBox) lunchBox.innerHTML = emptyMsg;
          return;
        }

        // Бежим по массиву полученных из базы слотов и распределяем их по колонкам
        slots.forEach(slot => {
          // Создаем красивую кнопку для каждого интервала
          const btn = document.createElement('button');
          btn.className = 'slot-item-btn free'; // По умолчанию все свободные, брони прикрутим следующим шагом
          btn.innerText = slot.slot_time;
          btn.onclick = () => alert(`Вы кликнули на слот: ${slot.slot_time}`);

          // Раскидываем кнопки по ID контейнеров в зависимости от типа 'short', 'mid', 'lunch'
          if (slot.type === 'short' && shortBox) {
            shortBox.appendChild(btn);
          } else if (slot.type === 'mid' && midBox) {
            midBox.appendChild(btn);
          } else if (slot.type === 'lunch' && lunchBox) {
            lunchBox.appendChild(btn);
          }
        });

      } catch (err) {
        alert("Ошибка загрузки расписания из базы: " + err.message);
      }
    }

    function startIdProject(user) {
      document.body.innerHTML = `<div style="text-align:center;font-size:24px;margin-top:50px;width:100%;color:var(--accent-neon);">🔍 Проект [ИД] успешно запущен для ${user.username}</div>`;
    }

    function switchMonitorTab(tabType, element) {
      document.querySelectorAll('.mon-tab').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      const title = document.getElementById('currentMonitorTitle');
      if (tabType === 'HL') title.innerText = 'ГОРЯЧАЯ ЛИНИЯ';
      else if (tabType === 'LIVE') title.innerText = 'ЧАТ LIVETEX';
      else title.innerText = 'ЧАТ LIVETEX НОЧЬ';
      console.log(`Админ переключился на просмотр смены: ${tabType}`);
    }
    // Функция массового импорта слотов времени для админа
    async function handleMassImportSlots() {
      // ИСПРАВЛЕНО: берём сохранённый канал из активной модалки
      const channel = activeModalChannel; 
      const type = document.getElementById('importType').value;
      const textarea = document.getElementById('importRawText');
      const rawText = textarea ? textarea.value.trim() : '';
      
      if (!rawText) {
        alert("Вставьте хотя бы один временной интервал!");
        return;
      }

      // Разбиваем текст по строкам
      const lines = rawText.split('\n');
      const slotsToInsert = [];
      const regex = /^\d{2}:\d{2}-\d{2}:\d{2}$/; // Регулярка проверки формата времени

      for (let line of lines) {
        let slot = line.trim();
        if (!slot) continue; // Пропускаем пустые строки

        // Проверяем формат времени
        if (!regex.test(slot)) {
          alert(`Ошибка в строке "${line}": Неверный формат! Используйте ЧЧ:ММ-ЧЧ:ММ (например, 14:00-14:15)`);
          return;
        }

        // Собираем объект для отправки в базу
        slotsToInsert.push({
          slot_time: slot,
          type: type,
          channel: channel
        });
      }

      if (slotsToInsert.length === 0) return;

      try {
        // Отправляем всю пачку в Supabase одной командой upsert (игнорирует дубликаты)
        const { data, error } = await db
          .from('time_slots')
          .upsert(slotsToInsert, { onConflict: 'slot_time,type,channel' }); // Наш составной ключ защитит от дублей

        if (error) throw error;

        alert(`Успешно загружено слотов: ${slotsToInsert.length}!`);
        document.getElementById('importRawText').value = ''; // Очищаем поле ввода
        
      } catch (err) {
        alert("Ошибка при массовом импорте: " + err.message);
      }
    }
    let activeModalChannel = '';

    // Функция открытия модалки + подгрузка живых тегов из Supabase
    async function openEditSlotsModal(channel) {
      activeModalChannel = channel;
      
      const modal = document.getElementById('slotsModal');
      const title = document.getElementById('modalChannelTitle');
      const midOption = document.getElementById('modalMidOption');
      const lunchOption = document.getElementById('modalLunchOption');
      
      if (channel === 'HL') {
        title.innerText = 'ЛИНИЯ';
        midOption.style.display = 'none';
        lunchOption.innerText = 'Обед 30 мин';
      } else {
        title.innerText = channel === 'LIVE' ? 'ЧАТ LIVETEX' : 'ЧАТ НОЧЬ';
        midOption.style.display = 'block';
        lunchOption.innerText = 'Обед 40 мин';
      }
      
      document.getElementById('importRawText').value = '';
      modal.style.display = 'flex';
      
      // Запускаем чтение и отрисовку тегов
      await fetchAndRenderModalTags();
    }

    function closeEditSlotsModal() {
      document.getElementById('slotsModal').style.display = 'none';
    }

    // Функция загрузки и автоматической сортировки тегов времени (без ID)
    async function fetchAndRenderModalTags() {
      const container = document.getElementById('modalTagsContainer');
      container.innerHTML = '<div style="color:var(--text-gray); text-align:center;">Загрузка интервалов...</div>';
      
      try {
        // Убрали 'id' из select, запрашиваем только существующие колонки
        const { data: slots, error } = await db
          .from('time_slots')
          .select('slot_time, type')
          .eq('channel', activeModalChannel)
          .order('slot_time', { ascending: true });

        if (error) throw error;
        container.innerHTML = '';

        if (!slots || slots.length === 0) {
          container.innerHTML = '<div style="color:var(--text-gray); text-align:center; padding:10px;">Лист пуст. Добавьте первый интервал!</div>';
          return;
        }

        const shortSlots = slots.filter(s => s.type === 'short');
        const midSlots = slots.filter(s => s.type === 'mid');
        const lunchSlots = slots.filter(s => s.type === 'lunch');

        const createGroupHTML = (titleText, slotsArray, colorClass) => {
          if (slotsArray.length === 0) return '';
          
          let block = document.createElement('div');
          block.innerHTML = `<div style="font-size:12px; font-weight:700; color:${colorClass}; margin-bottom:8px;">${titleText}:</div>`;
          
          let tagsWrapper = document.createElement('div');
          tagsWrapper.style.display = 'flex';
          tagsWrapper.style.flexWrap = 'wrap';
          tagsWrapper.style.gap = '6px';
          
          slotsArray.forEach(s => {
            const tag = document.createElement('div');
            tag.className = 'adm-int-tag';
            tag.style.fontSize = '12px';
            tag.style.padding = '4px 8px';
            // Передаем в функцию удаления само время и тип текстом
            tag.innerHTML = `${s.slot_time} <span style="margin-left:6px; color:#ff4d4d; font-weight:700; cursor:pointer;" onclick="deleteSingleSlot('${s.slot_time}', '${s.type}')">✕</span>`;
            tagsWrapper.appendChild(tag);
          });
          
          block.appendChild(tagsWrapper);
          return block;
        };

        let labelShort = activeModalChannel === 'HL' ? 'Перерывы 10 мин' : 'Перерывы 15 мин';
        let labelLunch = activeModalChannel === 'HL' ? 'Обеды 30 мин' : 'Обеды 40 мин';

        const htmlShort = createGroupHTML(labelShort, shortSlots, 'var(--accent-neon)');
        const htmlMid = createGroupHTML('Перерывы 20 мин', midSlots, '#9d4edd');
        const htmlLunch = createGroupHTML(labelLunch, lunchSlots, '#ff007f');

        if (htmlShort) container.appendChild(htmlShort);
        if (htmlMid) container.appendChild(htmlMid);
        if (htmlLunch) container.appendChild(htmlLunch);

      } catch (err) {
        container.innerHTML = `<div style="color:#ff4d4d;">Ошибка: ${err.message}</div>`;
      }
    }

    // Исправленная функция удаления по составному ключу (без ID)
    async function deleteSingleSlot(slotTime, type) {
      if (!confirm(`Удалить интервал ${slotTime} из расписания?`)) return;
      try {
        // Удаляем строку, у которой совпадают все три параметра составного ключа
        const { error } = await db
          .from('time_slots')
          .delete()
          .eq('slot_time', slotTime)
          .eq('type', type)
          .eq('channel', activeModalChannel);

        if (error) throw error;
        await fetchAndRenderModalTags(); // Мгновенно обновляем список
      } catch (err) { alert("Ошибка удаления: " + err.message); }
    }

    // Обновленная функция сохранения пачки
    async function handleMassImportSlots() {
      const channel = activeModalChannel;
      const type = document.getElementById('importType').value;
      const textarea = document.getElementById('importRawText');
      const rawText = textarea ? textarea.value.trim() : '';
      
      if (!rawText) {
        alert("Введите временной интервал!");
        return;
      }

      const lines = rawText.split('\n');
      const slotsToInsert = [];
      const regex = /^\d{2}:\d{2}-\d{2}:\d{2}$/;

      for (let line of lines) {
        let slot = line.trim();
        if (!slot) continue;
        if (!regex.test(slot)) {
          alert(`Неверный формат строки "${line}"! Используйте ЧЧ:ММ-ЧЧ:ММ`);
          return;
        }
        slotsToInsert.push({ slot_time: slot, type: type, channel: channel });
      }

      try {
        const { error } = await db.from('time_slots').upsert(slotsToInsert);
        if (error) throw error;

        document.getElementById('importRawText').value = '';
        // Мгновенно перерисовываем теги — новое время встанет на свое место по хронологии!
        await fetchAndRenderModalTags();
      } catch (err) { alert("Ошибка импорта: " + err.message); }
    }

  </script>
